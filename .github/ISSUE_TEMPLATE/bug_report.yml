name: Bug 反馈
description: 提交一个 Bug 问题
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 Bug，请尽量填写完整信息。

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的是哪个版本？
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚描述你遇到的问题
      placeholder: "发生了什么？"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请一步一步描述如何复现
      placeholder: |
        1. 打开...
        2. 点击...
        3. 出现...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你原本期望发生什么？
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可以粘贴日志、报错信息或上传截图
    validations:
      required: false
