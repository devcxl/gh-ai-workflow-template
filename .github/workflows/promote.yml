name: Promote PR
on:
  workflow_run:
    workflows: [Test]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success'
      && startsWith(github.event.workflow_run.head_branch, 'feat/issue-')
    steps:
      - name: Find PR and mark ready
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH"
            exit 0
          fi
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER"
            echo "PR #$PR_NUMBER marked as Ready for Review"
          else
            echo "PR #$PR_NUMBER is already ready"
          fi
          gh pr comment "$PR_NUMBER" --body "## 测试通过\n\n所有测试已通过，PR 已标记为 Ready for Review。"
