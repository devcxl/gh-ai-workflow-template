name: AI 方案提案
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: none

jobs:
  propose:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Post plan to issue
        env:
          HALF_CABBAGE_API_KEY: ${{ secrets.HALF_CABBAGE_API_KEY }}
        uses: anomalyco/opencode/github@latest
        with:
          model: half-cabbage/deepseek-v4-flash
          prompt: |
            你是一个资深架构师。
            请分析 Issue #${ISSUE_NUMBER} 的功能请求。
            使用 'gh issue view ${ISSUE_NUMBER}' 获取 issue 内容。
            检查现有的 app/ 和 tests/ 代码了解项目结构。
            生成实现方案包含需求分析、技术方案与变更清单、需要修改/新增的文件、测试策略。方案.
            用中文回复。