name: AI 实现
on:
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null
      && github.event.comment.body == '/approve'
      && github.event.comment.user.login == github.repository_owner

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Create feature branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git checkout -b "feat/issue-${ISSUE_NUMBER}"

      - name: Run opencode to implement
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          model: opencode-go/deepseek-v4-flash
          share: false
          use_github_token: true
          prompt: |
            You are implementing Issue #${ISSUE_NUMBER}. Use 'gh issue view ${ISSUE_NUMBER}' to read the issue context. Write tests in tests/ using pytest + TestClient, then implement the feature in app/ to make all tests pass. Do NOT modify .github/workflows files.

      - name: Commit and push
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "gh-ai-workflow[bot]"
          git config user.email "gh-ai-workflow[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement issue #${ISSUE_NUMBER}" --allow-empty
          git push origin "feat/issue-${ISSUE_NUMBER}"

      - name: Create Draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          gh pr create \
            --title "${ISSUE_TITLE}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "feat/issue-${ISSUE_NUMBER}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --draft
