name: AI 实现
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null
      && github.event.comment.body == '/approve'
      && github.event.comment.user.login == github.repository_owner

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Setup opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Create feature branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git checkout -b "feat/issue-${ISSUE_NUMBER}"

      - name: Fetch issue content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue view "$ISSUE_NUMBER" --json title,body,comments \
            --jq '"# \(.title)\n\n\(.body)\n\n## Comments\n\n\([.comments[] | "---\n\(.author.login): \(.body)"] | join("\n\n"))"' \
            > /tmp/issue_context.md

      - name: Run opencode to implement
        env:
          HALF_CABBAGE_API_KEY: ${{ secrets.HALF_CABBAGE_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          opencode run "You are implementing Issue #${ISSUE_NUMBER}. Read the issue context at /tmp/issue_context.md and existing codebase. Write tests in tests/ using pytest + TestClient, then implement the feature in app/ to make all tests pass. Do NOT modify .github/workflows files." \
            -f /tmp/issue_context.md

      - name: Commit and push
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "gh-ai-workflow[bot]"
          git config user.email "gh-ai-workflow[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement issue #${ISSUE_NUMBER}" --allow-empty
          git push origin "feat/issue-${ISSUE_NUMBER}"

      - name: Create Draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          gh pr create \
            --title "${ISSUE_TITLE}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "feat/issue-${ISSUE_NUMBER}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --draft


