name: 测试运行
on:
  push:
    branches:
      - 'feat/issue-*'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        id: test
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=short 2>&1 | tee pytest_output.txt

      - name: Update commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if grep -q "passed" pytest_output.txt && ! grep -q "FAILED" pytest_output.txt; then
            STATE="success"
            DESC="all tests passed"
          elif grep -q "FAILED" pytest_output.txt; then
            STATE="failure"
            DESC="some tests failed"
          else
            STATE="failure"
            DESC="test run error"
          fi
          curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"${STATE}\",\"description\":\"${DESC}\",\"context\":\"AI TDD Tests\"}"

      - name: Comment test result on PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            BODY=$(cat <<'EOF'
          ## Test Results
          EOF
            echo "${BODY}" > /tmp/comment_body.md
            echo '```' >> /tmp/comment_body.md
            cat pytest_output.txt >> /tmp/comment_body.md
            echo '```' >> /tmp/comment_body.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment_body.md
          fi
