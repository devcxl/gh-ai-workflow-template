name: Test
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to test
        required: true
        type: string
  push:
    branches:
      - 'feat/issue-*'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        id: test
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=short 2>&1 | tee pytest_output.txt

      - name: Check test result
        id: check
        if: always()
        run: |
          if grep -q "passed" pytest_output.txt && ! grep -q "FAILED" pytest_output.txt; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Update commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE="${{ steps.check.outputs.status == 'passed' && 'success' || 'failure' }}"
          DESC="${{ steps.check.outputs.status == 'passed' && 'all tests passed' || 'some tests failed' }}"
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="${STATE}" -f description="${DESC}" -f context="AI TDD Tests"

      - name: Comment test result on PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            BODY="## Test Results\n\`\`\`\n$(cat pytest_output.txt)\n\`\`\`"
            gh pr comment "$PR_NUMBER" --body "${BODY}"
          fi

      - name: Dispatch rework on failure
        if: steps.check.outputs.status == 'failed'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ENCODED=$(cat pytest_output.txt | base64 -w0)
          gh workflow run rework.yml \
            -f branch="${{ github.ref_name }}" \
            -f test_output="${ENCODED}"
